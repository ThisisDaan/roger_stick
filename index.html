<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Roger Stick</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #roger {
        position: absolute;
        width: 140px;
        height: 140px;
        left: 50%;
        margin-left: -70px;
        top: calc(100% - 160px);
        will-change: top, transform;
        /* No transition at start — set dynamically */
      }

      #roger img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /* Landing squish animation */
      @keyframes squish {
        0% {
          transform: rotate(var(--rot)) scaleX(1) scaleY(1);
        }
        20% {
          transform: rotate(var(--rot)) scaleX(1.35) scaleY(0.65);
        }
        45% {
          transform: rotate(var(--rot)) scaleX(0.85) scaleY(1.15);
        }
        65% {
          transform: rotate(var(--rot)) scaleX(1.1) scaleY(0.92);
        }
        80% {
          transform: rotate(var(--rot)) scaleX(0.97) scaleY(1.03);
        }
        100% {
          transform: rotate(var(--rot)) scaleX(1) scaleY(1);
        }
      }

      #roger.squish-bottom {
        --rot: 0deg;
        animation: squish 0.45s ease-out forwards;
      }

      #roger.squish-top {
        --rot: 180deg;
        animation: squish 0.45s ease-out forwards;
      }

      /* Tap-to-start overlay */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.82);
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        gap: 14px;
        cursor: pointer;
        z-index: 20;
      }

      #overlay .big {
        font-size: 56px;
        line-height: 1;
      }
      #overlay .main {
        font-size: 24px;
        font-weight: bold;
      }
      #overlay .sub {
        font-size: 14px;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div id="scene">
      <img id="roger" src="rogerbot.png" alt="Roger" />
    </div>

    <div id="overlay">
      <div class="big">🤙</div>
      <div class="main">Tap to start</div>
      <div class="sub">Then flip your phone upside-down!</div>
    </div>

    <audio id="audioUp" src="up.mp3" preload="auto"></audio>
    <audio id="audioDown" src="down.mp3" preload="auto"></audio>

    <script>
      const roger = document.getElementById("roger");
      const overlay = document.getElementById("overlay");
      const audioUp = document.getElementById("audioUp");
      const audioDown = document.getElementById("audioDown");

      /* ── Audio durations ── */
      let upDur = 0.9;
      let downDur = 0.9;
      audioUp.addEventListener("loadedmetadata", () => {
        upDur = Math.max(0.3, audioUp.duration);
      });
      audioDown.addEventListener("loadedmetadata", () => {
        downDur = Math.max(0.3, audioDown.duration);
      });

      /* ── Constants ── */
      const TOP_PX = 20;
      function getBottomPx() {
        return window.innerHeight - 160;
      }

      /* ── State ── */
      let flipped = false;
      let started = false;
      let animTimer = null;

      /* ── Read Roger's actual rendered top mid-animation ── */
      function getCurrentTopPx() {
        return parseFloat(getComputedStyle(roger).top);
      }

      /* ── Read Roger's actual rendered rotation mid-animation ── */
      function getCurrentRotDeg() {
        const mat = getComputedStyle(roger).transform;
        if (!mat || mat === "none") return 0;
        const m = mat.match(/matrix\(([^)]+)\)/);
        if (!m) return 0;
        const parts = m[1].split(",").map(parseFloat);
        return Math.round((Math.atan2(parts[1], parts[0]) * 180) / Math.PI);
      }

      function triggerSquish(cls) {
        roger.classList.remove("squish-bottom", "squish-top");
        void roger.offsetWidth;
        roger.classList.add(cls);
      }

      /* ── Core move: works whether idle or mid-animation ── */
      function moveTo(destPx, totalDur, audio, squishCls, targetRot) {
        // Cancel any in-flight landing timer
        if (animTimer) {
          clearTimeout(animTimer);
          animTimer = null;
        }

        // Freeze Roger at its current rendered position
        const currentPx = getCurrentTopPx();
        const currentRot = getCurrentRotDeg();
        roger.style.transition = "none";
        roger.style.top = currentPx + "px";
        roger.style.transform = `rotate(${currentRot}deg)`;
        void roger.offsetWidth; // reflow

        // Fraction of journey still remaining
        const fullDist = getBottomPx() - TOP_PX;
        const remainDist = Math.abs(destPx - currentPx);
        const remain = Math.min(1, Math.max(0.01, remainDist / fullDist));

        // Seek audio to matching position so it ends exactly when animation does
        audio.pause();
        audio.currentTime = (1 - remain) * totalDur;
        audio.play().catch(() => {});

        const dur = remain * totalDur;

        // Animate to destination
        roger.style.transition = `top ${dur}s cubic-bezier(0.42,0,1,1), transform ${dur * 0.25}s ease-in`;
        roger.style.top = destPx + "px";
        roger.style.transform = `rotate(${targetRot}deg)`;

        animTimer = setTimeout(() => {
          triggerSquish(squishCls);
          animTimer = null;
        }, dur * 1000);
      }

      function goUp() {
        flipped = true;
        moveTo(TOP_PX, upDur, audioUp, "squish-top", 180);
      }
      function goDown() {
        flipped = false;
        moveTo(getBottomPx(), downDur, audioDown, "squish-bottom", 0);
      }

      /* ── Device orientation ── */
      function handleOrientation(e) {
        if (!started) return;
        const beta = e.beta;
        if (beta === null) return;

        let nowFlipped;
        if (beta < -25) nowFlipped = true;
        else if (beta > 25) nowFlipped = false;
        else return; // flat zone – ignore

        if (nowFlipped === flipped) return; // already going that way

        if (nowFlipped) goUp();
        else goDown();
      }

      /* ── Start on tap (required for iOS gyro + audio unlock) ── */
      overlay.addEventListener("click", () => {
        overlay.style.display = "none";
        started = true;

        // Snap Roger to bottom
        roger.style.transition = "none";
        roger.style.top = getBottomPx() + "px";
        roger.style.transform = "rotate(0deg)";
        flipped = false;

        // Unlock iOS audio
        [audioUp, audioDown].forEach((a) => {
          a.play()
            .then(() => a.pause())
            .catch(() => {});
        });

        // Request gyroscope permission on iOS 13+
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          DeviceOrientationEvent.requestPermission()
            .then((r) => {
              if (r === "granted")
                window.addEventListener("deviceorientation", handleOrientation);
            })
            .catch(console.error);
        } else {
          window.addEventListener("deviceorientation", handleOrientation);
        }
      });
    </script>
  </body>
</html>
