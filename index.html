<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Roger Stick</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #scene {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.08),
            transparent 35%
          ),
          linear-gradient(180deg, #1f1f1f 0%, #121212 45%, #090909 100%);
      }

      #tubeRig {
        position: absolute;
        left: 50%;
        top: 20px;
        bottom: 20px;
        width: 188px;
        margin-left: -94px;
        transform-origin: 50% 50%;
        will-change: transform;
      }

      #tube {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 164px;
        margin-left: -82px;
        border-radius: 999px;
        border: 3px solid rgba(225, 232, 240, 0.42);
        background:
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.18),
            rgba(255, 255, 255, 0.03) 25%,
            rgba(255, 255, 255, 0.13) 52%,
            rgba(255, 255, 255, 0.04) 72%,
            rgba(255, 255, 255, 0.16)
          ),
          linear-gradient(
            180deg,
            rgba(55, 66, 83, 0.45),
            rgba(24, 31, 40, 0.18)
          );
        box-shadow:
          inset 0 0 26px rgba(255, 255, 255, 0.06),
          inset 0 0 45px rgba(0, 0, 0, 0.42),
          0 20px 55px rgba(0, 0, 0, 0.45);
        pointer-events: none;
      }

      #tube::before,
      #tube::after {
        content: "";
        position: absolute;
        left: 50%;
        width: 188px;
        height: 24px;
        margin-left: -94px;
        border-radius: 999px;
        background: linear-gradient(180deg, #d4d8de, #7f8a96);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
      }

      #tube::before {
        top: -10px;
      }

      #tube::after {
        bottom: -10px;
      }

      #tubeHint {
        position: absolute;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%);
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.74);
        font:
          600 12px/1.2 Arial,
          sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
        backdrop-filter: blur(8px);
        pointer-events: none;
      }

      #roger {
        position: absolute;
        width: 140px;
        height: 140px;
        left: 50%;
        margin-left: -70px;
        top: calc(100% - 152px);
        will-change: top, transform;
        z-index: 2;
      }

      #roger img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /* Landing squish animation */
      @keyframes squish {
        0% {
          transform: rotate(var(--roger-rot)) scaleX(1) scaleY(1);
        }
        20% {
          transform: rotate(var(--roger-rot)) scaleX(1.35) scaleY(0.65);
        }
        45% {
          transform: rotate(var(--roger-rot)) scaleX(0.85) scaleY(1.15);
        }
        65% {
          transform: rotate(var(--roger-rot)) scaleX(1.1) scaleY(0.92);
        }
        80% {
          transform: rotate(var(--roger-rot)) scaleX(0.97) scaleY(1.03);
        }
        100% {
          transform: rotate(var(--roger-rot)) scaleX(1) scaleY(1);
        }
      }

      #roger.squish {
        animation: squish 0.45s ease-out forwards;
      }

      /* Tap-to-start overlay */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.82);
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        gap: 14px;
        cursor: pointer;
        z-index: 20;
      }

      #overlay .big {
        font-size: 56px;
        line-height: 1;
      }
      #overlay .main {
        font-size: 24px;
        font-weight: bold;
      }
      #overlay .sub {
        font-size: 14px;
        opacity: 0.55;
        max-width: 280px;
      }

      body.desktop-ready #scene {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="scene">
      <div id="tubeRig">
        <div id="tube" aria-hidden="true"></div>
        <img id="roger" src="rogerbot.png" alt="Roger" />
      </div>
      <div id="tubeHint">Click Roger to flip</div>
    </div>

    <div id="overlay">
      <div class="big">🤙</div>
      <div class="main">Tap to start</div>
      <div class="sub">
        On phone, flip your device. On desktop, click Roger to rotate him
        through the tube.
      </div>
    </div>

    <audio id="audioUp" src="up2.mp3" preload="auto"></audio>
    <audio id="audioDown" src="down.mp3" preload="auto"></audio>

    <script>
      const roger = document.getElementById("roger");
      const scene = document.getElementById("scene");
      const tubeRig = document.getElementById("tubeRig");
      const overlay = document.getElementById("overlay");
      const tubeHint = document.getElementById("tubeHint");
      const audioUp = document.getElementById("audioUp");
      const audioDown = document.getElementById("audioDown");

      /* ── Audio durations ── */
      let upDur = 0.9;
      let downDur = 0.9;
      audioUp.addEventListener("loadedmetadata", () => {
        upDur = Math.max(0.3, audioUp.duration);
      });
      audioDown.addEventListener("loadedmetadata", () => {
        downDur = Math.max(0.3, audioDown.duration);
      });

      /* ── Constants ── */
      const TOP_LOCAL_PX = 12;
      const BOTTOM_PADDING_PX = 12;
      const ROGER_SIZE_PX = 140;
      const TUBE_FLIP_SECONDS = 0.24;
      const FALL_SECONDS = 0.7;
      const FALL_DELAY_SECONDS = 0;

      function getBottomLocalPx() {
        return tubeRig.clientHeight - ROGER_SIZE_PX - BOTTOM_PADDING_PX;
      }

      /* ── State ── */
      let flipped = false;
      let started = false;
      let animTimer = null;
      const isDesktopLike = window.matchMedia(
        "(hover: hover) and (pointer: fine)",
      );

      function syncDesktopMode() {
        document.body.classList.toggle("desktop-ready", isDesktopLike.matches);
        tubeHint.textContent = isDesktopLike.matches
          ? "Click Roger to flip"
          : "Flip your phone to move Roger";

        if (!started) return;

        tubeRig.style.transition = "none";
        roger.style.transition = "none";
        tubeRig.style.transform = `rotate(${isDesktopLike.matches && flipped ? 180 : 0}deg)`;
        roger.style.top = (flipped ? TOP_LOCAL_PX : getBottomLocalPx()) + "px";
        setRogerRotation(flipped ? 180 : 0, isDesktopLike.matches);
      }

      function getCurrentRogerTopPx() {
        return parseFloat(getComputedStyle(roger).top);
      }

      function getCurrentTubeRotDeg() {
        const mat = getComputedStyle(tubeRig).transform;
        if (!mat || mat === "none") return 0;
        const m = mat.match(/matrix\(([^)]+)\)/);
        if (!m) return 0;
        const parts = m[1].split(",").map(parseFloat);
        return Math.round((Math.atan2(parts[1], parts[0]) * 180) / Math.PI);
      }

      function getRogerRotationDeg(tubeRotationDeg, isTubeRotating) {
        return isTubeRotating ? -tubeRotationDeg : tubeRotationDeg;
      }

      function setRogerRotation(tubeRotationDeg, isTubeRotating) {
        const rogerRotationDeg = getRogerRotationDeg(
          tubeRotationDeg,
          isTubeRotating,
        );
        roger.style.setProperty("--roger-rot", `${rogerRotationDeg}deg`);
        roger.style.transform = `rotate(${rogerRotationDeg}deg)`;
      }

      function triggerSquish(tubeRotationDeg, isTubeRotating) {
        const rogerRotationDeg = getRogerRotationDeg(
          tubeRotationDeg,
          isTubeRotating,
        );
        roger.classList.remove("squish");
        roger.style.setProperty("--roger-rot", `${rogerRotationDeg}deg`);
        void roger.offsetWidth;
        roger.classList.add("squish");
      }

      function moveTo(destTopPx, targetTubeRot, audio) {
        if (animTimer) {
          clearTimeout(animTimer);
          animTimer = null;
        }

        const currentTopPx = getCurrentRogerTopPx();
        const currentTubeRot = getCurrentTubeRotDeg();
        const rotateTube = isDesktopLike.matches;
        const effectiveTargetTubeRot = rotateTube ? targetTubeRot : 0;

        tubeRig.style.transition = "none";
        tubeRig.style.transform = `rotate(${currentTubeRot}deg)`;
        roger.style.transition = "none";
        roger.style.top = currentTopPx + "px";
        setRogerRotation(currentTubeRot, rotateTube);
        void roger.offsetWidth;

        const fullDist = Math.max(1, getBottomLocalPx() - TOP_LOCAL_PX);
        const fallRemainDist = Math.abs(destTopPx - currentTopPx);
        const fallRemain = Math.min(
          1,
          Math.max(0.01, fallRemainDist / fullDist),
        );
        const rotationRemain = Math.min(
          1,
          Math.max(
            0.01,
            Math.abs(effectiveTargetTubeRot - currentTubeRot) / 180,
          ),
        );

        audio.pause();
        audio.currentTime = 0;
        audio.play().catch(() => {});

        const tubeDur = Math.max(0.12, rotationRemain * TUBE_FLIP_SECONDS);
        const fallDur = Math.max(0.24, fallRemain * FALL_SECONDS);
        const releaseDelay = tubeDur + FALL_DELAY_SECONDS;

        tubeRig.style.transition = `transform ${tubeDur}s linear`;
        roger.style.transition = `top ${fallDur}s linear ${releaseDelay}s, transform ${Math.max(0.16, tubeDur * 0.9)}s linear`;
        tubeRig.style.transform = `rotate(${effectiveTargetTubeRot}deg)`;
        roger.style.top = destTopPx + "px";
        setRogerRotation(targetTubeRot, rotateTube);

        animTimer = setTimeout(
          () => {
            triggerSquish(targetTubeRot, rotateTube);
            animTimer = null;
          },
          (releaseDelay + fallDur) * 1000,
        );
      }

      function goUp() {
        flipped = true;
        moveTo(TOP_LOCAL_PX, 180, audioUp);
      }

      function goDown() {
        flipped = false;
        moveTo(getBottomLocalPx(), 0, audioDown);
      }

      function toggleRoger() {
        if (!started) return;
        if (flipped) goDown();
        else goUp();
      }

      /* ── Device orientation ── */
      function handleOrientation(e) {
        if (!started) return;
        if (isDesktopLike.matches) return;
        const beta = e.beta;
        if (beta === null) return;

        let nowFlipped;
        if (beta < -25) nowFlipped = true;
        else if (beta > 25) nowFlipped = false;
        else return; // flat zone – ignore

        if (nowFlipped === flipped) return; // already going that way

        if (nowFlipped) goUp();
        else goDown();
      }

      /* ── Start on tap (required for iOS gyro + audio unlock) ── */
      overlay.addEventListener("click", () => {
        overlay.style.display = "none";
        started = true;

        tubeRig.style.transition = "none";
        tubeRig.style.transform = "rotate(0deg)";
        roger.style.transition = "none";
        roger.style.top = getBottomLocalPx() + "px";
        setRogerRotation(0, isDesktopLike.matches);
        flipped = false;

        // Unlock iOS audio
        [audioUp, audioDown].forEach((a) => {
          a.play()
            .then(() => a.pause())
            .catch(() => {});
        });

        // Request gyroscope permission on iOS 13+
        if (
          typeof DeviceOrientationEvent !== "undefined" &&
          typeof DeviceOrientationEvent.requestPermission === "function"
        ) {
          DeviceOrientationEvent.requestPermission()
            .then((r) => {
              if (r === "granted")
                window.addEventListener("deviceorientation", handleOrientation);
            })
            .catch(console.error);
        } else {
          window.addEventListener("deviceorientation", handleOrientation);
        }
      });

      scene.addEventListener("click", () => {
        if (!started || !isDesktopLike.matches) return;
        toggleRoger();
      });

      isDesktopLike.addEventListener("change", syncDesktopMode);
      syncDesktopMode();

      window.addEventListener("resize", () => {
        if (!started) return;
        tubeRig.style.transition = "none";
        roger.style.transition = "none";
        tubeRig.style.transform = `rotate(${isDesktopLike.matches && flipped ? 180 : 0}deg)`;
        roger.style.top = (flipped ? TOP_LOCAL_PX : getBottomLocalPx()) + "px";
        setRogerRotation(flipped ? 180 : 0, isDesktopLike.matches);
      });
    </script>
  </body>
</html>
